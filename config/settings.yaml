project_name: baseball_team_efficiency_engine
min_year: 1990
warehouse_path: data/warehouse/baseball_analytics.duckdb
raw_dir: data/raw
staging_dir: data/staging
artifacts_dir: artifacts
sources:
  teams: https://vincentarelbundock.github.io/Rdatasets/csv/Lahman/Teams.csv
  salaries: https://vincentarelbundock.github.io/Rdatasets/csv/Lahman/Salaries.csv
  people: https://vincentarelbundock.github.io/Rdatasets/csv/Lahman/People.csv
  batting: https://vincentarelbundock.github.io/Rdatasets/csv/Lahman/Batting.csv
  pitching: https://vincentarelbundock.github.io/Rdatasets/csv/Lahman/Pitching.csv
  fielding: https://vincentarelbundock.github.io/Rdatasets/csv/Lahman/Fielding.csv
modeling:
  random_state: 42
  test_size: 0.2
  n_clusters: 4
war:
  market_rate_per_war: 8000000   # $ per WAR on open market
  runs_per_win: 9.5
  replacement_wins: 48           # wins a 0-WAR roster produces
  league_woba: 0.320
  woba_scale: 1.20
  league_fip_constant: 3.20
  league_ra9: 4.50

# Sportradar MLB API v8
# API key: set SPORTRADAR_API_KEY env var (never commit keys here).
# Add to Cursor Cloud Agent Secrets at cursor.com/dashboard so it is
# injected automatically into cloud runs.
sportradar:
  access_level: trial          # 'trial' or 'production'
  team_crosswalk: data/crosswalks/sportradar_team_map.csv
  cache_dir: data/sr_cache
  default_years: [2024]
  min_request_interval: 1.1
